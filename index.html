<!DOCTYPE html>
<html>
<head>
<base target="_top">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0; padding: 0;
    background: linear-gradient(135deg, #2c3e50, #000000);
    height: 100vh; display: flex; justify-content: center; align-items: center;
  }
  .login-container {
    background: white; padding: 40px; border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    width: 100%; max-width: 400px; text-align: center;
    border-top: 8px solid #FF9800;
  }
  .login-container h1 { color: #333; margin-bottom: 5px; font-size: 2em; }
  .login-container p { color: #666; margin-bottom: 30px; }
  .input-group { margin-bottom: 20px; text-align: left; }
  .input-group label { font-weight: bold; color: #424242; font-size: 0.9em; display: block; margin-bottom: 8px; }
  .input-group select, .input-group input {
    width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px;
    font-size: 1em; box-sizing: border-box; transition: 0.3s;
  }
  .input-group select:focus, .input-group input:focus { border-color: #FF9800; outline: none; box-shadow: 0 0 10px rgba(255,152,0,0.2); }
  .btn-login {
    background: linear-gradient(135deg, #FF9800, #F57C00);
    color: white; border: none; padding: 15px; width: 100%;
    border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer;
    box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4); transition: all 0.3s;
  }
  .btn-login:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(255, 152, 0, 0.6); }

  /* MODAL DO LOGIN */
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(5px); }
  .modal-box { background: white; padding: 30px; border-radius: 15px; text-align: center; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); border-top: 8px solid #f44336; animation: popIn 0.3s ease-out; }
  .modal-box i { font-size: 50px; color: #f44336; margin-bottom: 15px; }
  .modal-box h2 { margin: 0 0 10px 0; color: #333; }
  .modal-box button { background: linear-gradient(135deg, #f44336, #d32f2f); color: white; border: none; padding: 12px 30px; border-radius: 8px; font-size: 1em; cursor: pointer; font-weight: bold; margin-top: 15px; }
  @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>

<div class="login-container">
  <div style="background: linear-gradient(135deg, #FFC107, #FF9800); width: 80px; height: 80px; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 15px auto; box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4);">
    <i class="fas fa-graduation-cap" style="font-size: 35px; color: white;"></i>
  </div>
  <h1>Portal de Estágio e Gestão</h1>
  <p>Educ Centro de Ensino</p>

  <div class="input-group">
    <label>Perfil de Acesso</label>
    <select id="login_tipo">
      <option value="Estagiario">👨‍🎓 Acesso: Estagiário</option>
      <option value="Coordenacao">👔 Acesso: Coordenação</option>
    </select>
  </div>
  
  <div class="input-group">
    <label>Credencial</label>
    <input type="password" id="login_senha" placeholder="Digite sua senha">
  </div>
  
  <button class="btn-login" onclick="fazerLogin()" id="btnAcesso"><i class="fas fa-sign-in-alt"></i> Entrar no Sistema</button>
</div>

<div class="modal-overlay" id="modalErro">
  <div class="modal-box">
    <i class="fas fa-exclamation-triangle"></i>
    <h2>Acesso Negado</h2>
    <p id="msgErro" style="color:#666;"></p>
    <button onclick="document.getElementById('modalErro').style.display='none'">Tentar Novamente</button>
  </div>
</div>

<script>
  // IMPORTANTE: COLOQUE A MESMA URL DO SEU WEB APP AQUI TAMBÉM
  const API_URL = "SUA_URL_DO_WEB_APP_AQUI/exec";

  function chamarAPI(action, payload, onSuccess) {
    fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({ action: action, payload: payload })
    })
    .then(res => res.json())
    .then(data => { if (onSuccess) onSuccess(data); })
    .catch(err => {
      mostrarErro("Erro de conexão com o servidor. Verifique o seu acesso e tente novamente.");
      var btn = document.getElementById('btnAcesso');
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar no Sistema';
      btn.disabled = false;
      console.error("Erro API:", err);
    });
  }

  function mostrarErro(msg) {
    document.getElementById('msgErro').innerText = msg;
    document.getElementById('modalErro').style.display = 'flex';
  }

  function fazerLogin() {
    var btn = document.getElementById('btnAcesso');
    var senha = document.getElementById("login_senha").value;
    var tipo = document.getElementById("login_tipo").value;
    
    if(!senha) return mostrarErro("Por favor, digite sua credencial de acesso!");
    
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Autenticando...';
    btn.disabled = true;

    if(tipo === "Coordenacao") {
       if(senha === "987654") { 
           // Redireciona diretamente para o arquivo local
           window.open("Coordenacao.html", "_top");
       } else {
           mostrarErro("Credencial de Coordenação incorreta!");
           btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar no Sistema';
           btn.disabled = false;
       }
    } else {
       // Consulta a planilha via API para validar o estagiário
       chamarAPI('verificarLoginEstagiario', { senha: senha }, function(res) {
           if(res.sucesso) {
               // Redireciona para o arquivo local passando o nome na URL
               window.open("Estagiario.html?nome=" + encodeURIComponent(res.nome), "_top");
           } else {
               mostrarErro(res.msg || "Erro na validação.");
               btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar no Sistema';
               btn.disabled = false;
           }
       });
    }
  }
</script>
</body>
</html>
